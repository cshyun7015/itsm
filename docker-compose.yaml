services:
  # 1. Database (MariaDB)
  itsm-db:
    image: mariadb:10.11 # ARM64 네이티브 지원
    container_name: itsm-mariadb
    # 🌟 메모리 압박 경고가 있어도 시스템이 강제로 컨테이너를 죽이지 않도록 제한 설정
    deploy:
      resources:
        limits:
          memory: 1G  # Mac mini 메모리 상황에 맞게 조절 (예: 512M ~ 2G)
        reservations:
          memory: 256M
    # 🌟 아래 command 설정을 추가해 주세요!
    command:
      - --innodb-use-native-aio=0  # 이전 io_uring 경고 해결용
      - --innodb_buffer_pool_size=256M # 실제 할당 메모리의 50~70% 권장
      - --binlog-expire-logs-seconds=0  # 🌟 로그 만료 설정을 꺼서 경고 제거
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: itsm_db
      MYSQL_USER: itsm_user
      MYSQL_PASSWORD: itsm_password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - itsm-db-data:/var/lib/mysql
    networks:
      - itsm-network

  # 2. Backend (Spring Boot)
  itsm-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: itsm-spring-boot
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://itsm-db:3306/itsm_db
      - SPRING_DATASOURCE_USERNAME=itsm_user
      - SPRING_DATASOURCE_PASSWORD=itsm_password
    healthcheck:
      # Spring Boot Actuator가 없다면 "curl -f http://localhost:8080/api/auth/login || exit 1" 등으로 대체 가능합니다.
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s    # 10초마다 체크
      timeout: 5s     # 5초 안에 응답 없으면 실패
      retries: 10     # 애플리케이션이 뜨는 시간이 있으므로 넉넉하게 재시도
      start_period: 20s # 초기 구동 시간 동안은 실패해도 카운트하지 않음
    depends_on:
      itsm-db:
        condition: service_healthy # DB가 건강할 때 백엔드 시작
    networks:
      - itsm-network

  # 3. Frontend (React)
  itsm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itsm-react
    ports:
      - "3000:5173"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8080
    depends_on:
      itsm-backend:
        condition: service_healthy # 🌟 백엔드가 Healthcheck 통과 시 프론트 시작
    networks:
      - itsm-network

  # 🌟 4. Prometheus 컨테이너
  prometheus:
    image: prom/prometheus:latest
    container_name: itsm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # 방금 만든 설정 파일 마운트
    networks:
      - itsm-network

  # 🌟 5. Grafana 컨테이너
  grafana:
    image: grafana/grafana:latest
    container_name: itsm-grafana
    ports:
      - "3001:3000" # 프론트엔드(3000)와 겹치지 않게 3001번 포트 사용
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # 초기 비밀번호 설정
    depends_on:
      - prometheus
    networks:
      - itsm-network

  # 🌟 6. Node Exporter (범용 OS/인프라 모니터링)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: itsm-node-exporter
    ports:
      - "9100:9100"
    # Mac/Linux 호스트의 실제 데이터를 읽기 위해 시스템 경로를 마운트합니다.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - itsm-network

  # 🌟 7. MySQL / MariaDB Exporter (범용 DB 모니터링)
  mariadb-exporter:
    image: prom/mysqld-exporter:latest
    container_name: itsm-mariadb-exporter
    ports:
      - "9104:9104"
    # 🌟 추가된 부분: 방금 만든 my.cnf 파일을 컨테이너 내부로 쏙 넣어줍니다.
    volumes:
      - ./my.cnf:/etc/.my.cnf:ro
    # 🌟 추가된 부분: Exporter에게 "이 파일을 읽어서 DB에 접속해!"라고 명령합니다.
    command:
      - '--config.my-cnf=/etc/.my.cnf'
    depends_on:
      - itsm-db
    networks:
      - itsm-network

networks:
  itsm-network:
    driver: bridge

volumes:
  itsm-db-data:
